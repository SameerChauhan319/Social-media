<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodigy Connect | Social Media Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-view" class="auth-container">
        <div class="auth-card">
            <div class="logo">Prodigy<span>Connect</span></div>
            <div class="auth-tabs">
                <button id="show-login" class="active">Login</button>
                <button id="show-register">Register</button>
            </div>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <form id="register-form" class="hidden">
                <input type="text" id="reg-user" placeholder="Username" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-pass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            <p id="auth-error" class="error hidden"></p>
        </div>
    </div>

    <div id="main-view" class="main-container hidden">
        <nav class="sidebar">
            <div class="logo">Prodigy<span>Connect</span></div>
            <ul class="nav-links">
                <li class="active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home</li>
                <li><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> Explore</li>
                <li><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> Notifications</li>
                <li id="profile-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> Profile</li>
            </ul>
            <div class="user-info">
                <img id="current-user-avatar" src="" alt="">
                <span id="current-user-name"></span>
                <button id="logout-btn">Logout</button>
            </div>
        </nav>

        <main class="feed">
            <header class="feed-header">
                <span>Home</span>
                <div class="header-search">
                    <input type="text" id="global-search" placeholder="Search Prodigy Connect...">
                    <div id="search-results" class="hidden"></div>
                </div>
            </header>
            
            <div class="post-creator">
                <img id="creator-avatar" src="" alt="">
                <div class="creator-input">
                    <textarea id="post-content" placeholder="What's happening?"></textarea>
                    <div class="creator-actions">
                        <label for="post-image" class="action-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <input type="file" id="post-image" hidden accept="image/*">
                        </label>
                        <button id="submit-post" class="btn-primary">Post</button>
                    </div>
                    <div id="image-preview" class="hidden"></div>
                </div>
            </div>

            <div id="posts-container">
                <!-- Posts dynamic -->
            </div>

            <div id="notifications-container" class="hidden">
                <div id="notifications-list"></div>
            </div>

            <div id="explore-view" class="hidden">
                <!-- Explore posts dynamic -->
            </div>

            <div id="profile-view" class="hidden">
                <div class="profile-header">
                    <img id="profile-avatar" src="" alt="">
                    <div class="profile-meta">
                        <h2 id="profile-name"></h2>
                        <p id="profile-bio"></p>
                        <div class="profile-stats">
                            <span id="followers-count"><b>0</b> Followers</span>
                            <span id="following-count"><b>0</b> Following</span>
                        </div>
                        <div class="profile-actions">
                            <button id="follow-btn" class="btn-primary">Follow</button>
                            <button id="edit-profile-btn" class="btn-secondary hidden">Edit Profile</button>
                        </div>
                    </div>
                </div>
                <div id="profile-posts"></div>
            </div>
        </main>

        <aside class="trends">
            <div class="trend-card">
                <h3>Trending Users</h3>
                <div id="trending-users-list">
                    <!-- Trending users dynamic -->
                </div>
            </div>
            <div class="trend-card">
                <h3>Trending for you</h3>
                <div class="trend-item">#NexusAI <span>2.4k posts</span></div>
                <div class="trend-item">#ProdigyInfotech <span>1.2k posts</span></div>
                <div class="trend-item">#WebDev <span>850 posts</span></div>
                <div class="trend-item">#SocialConnect <span>520 posts</span></div>
            </div>
            <div class="trend-card">
                <h3>Who to follow</h3>
                <div id="suggestions-list">
                    <!-- Suggested users dynamic -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div id="edit-profile-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <button id="close-edit-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body p-20">
                <label>Bio</label>
                <textarea id="edit-bio" class="input-modern" placeholder="Tell us about yourself..."></textarea>
                <label>Avatar URL</label>
                <input type="text" id="edit-avatar" class="input-modern" placeholder="https://...">
                <button id="save-profile" class="btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="comments-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Comments</h3>
                <button id="close-modal">&times;</button>
            </div>
            <div id="comments-list"></div>
            <div class="comment-input">
                <input type="text" id="new-comment" placeholder="Write a comment...">
                <button id="submit-comment">Post</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
